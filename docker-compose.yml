version: '3.8'

services:
  telegram-bot:
    build: .
    container_name: autosverify-bot
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./database.json:/app/database.json
      - ./drive-token.json:/app/drive-token.json
      - ./drive-credentials.json:/app/drive-credentials.json
      - ./backups:/app/backups
    environment:
      - TZ=Asia/Dhaka
      - PUBLIC_URL=${PUBLIC_URL}
